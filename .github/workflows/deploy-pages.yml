name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enables GitHub Pages for the repo on first run — no manual
          # step needed in the repo settings.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site lives at the repo root — no build step.
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
