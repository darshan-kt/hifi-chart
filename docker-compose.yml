services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: hifi-chats:latest
    container_name: hifi-chats-web
    environment:
      PORT: 80
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
